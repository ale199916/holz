<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Activo</title>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <style>
        /* Forzamos al contenedor a tener tamaño */
        #n8n-chat { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <h1>El chat está intentando cargar abajo...</h1>
    <div id="n8n-chat"></div>

    <script src="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.js"></script>
    <script>
        window.addEventListener('load', () => {
            if (typeof N8nChat !== 'undefined') {
                N8nChat.init({
                    webhookUrl: 'https://alerome99.app.n8n.cloud/webhook/0372e3f4-eadb-4863-8965-c3876d91f442/chat',
                    mode: 'embedded',
                    containerId: 'n8n-chat'
                });
            }
        });
    </script>
</body>
</html>
