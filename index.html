<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>
</head>
<body>
    <h1>Chatbot</h1>

    <script src="https://unpkg.com/@n8n/chat/dist/chat.bundle.js"></script>
    
    <script>
        window.addEventListener('load', () => {
            if (typeof N8nChat !== 'undefined') {
                N8nChat.createChat({
                    webhookUrl: 'https://alerome99.app.n8n.cloud/webhook/0372e3f4-eadb-4863-8965-c3876d91f442/chat',
                    mode: 'window',
                    showWelcomeScreen: true
                });
                console.log("Chat cargado vía UNPKG");
            } else {
                console.error("Error: N8nChat sigue sin definirse. Bloqueo de red detectado.");
            }
        });
    </script>
</body>
</html>
